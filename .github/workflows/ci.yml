name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    runs-on: ubuntu-latest
    name: validate compose
    steps:
      - uses: actions/checkout@v4

      # GitHub-hosted Ubuntu runners ship Docker + the Compose plugin, so we can
      # validate the stack definition (interpolation, schema, service graph)
      # without pulling images.
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Assert expected services are defined
        run: |
          services="$(docker compose -f docker-compose.yml config --services)"
          echo "Services: $services"
          echo "$services" | grep -qx kafka
          echo "$services" | grep -qx schema-registry

  test:
    runs-on: ubuntu-latest
    name: test (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest -q
